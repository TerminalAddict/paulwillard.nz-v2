  <style>
    :root {
      --orbit-ink: #16181d;
      --orbit-mint: #d9f0e7;
      --orbit-line: rgba(22, 24, 29, .14);
      --orbit-shadow: 0 20px 60px rgba(26, 36, 52, .14);
      --orbit-radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fbfaf6;
    }

    .nav-orbit {
      position: fixed;
      right: clamp(1rem, 3vw, 2.5rem);
      top: 50%;
      z-index: 20;
      width: 8.5rem;
      height: 8.5rem;
      transform: translateY(-50%);
    }

    .nav-toggle {
      position: absolute;
      inset: 2rem;
      border: 1px solid var(--orbit-line);
      border-radius: 50%;
      background: rgba(255, 255, 255, .86);
      box-shadow: var(--orbit-shadow);
      cursor: pointer;
      display: grid;
      place-items: center;
      backdrop-filter: blur(16px);
    }

    .nav-toggle svg {
      width: 1.7rem;
      height: 1.7rem;
      transition: transform .4s cubic-bezier(.2, .9, .2, 1);
    }

    .nav-orbit[data-open="true"] .nav-toggle svg {
      transform: rotate(135deg);
    }

    .nav-item {
      --angle: 0deg;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2.65rem;
      height: 2.65rem;
      display: grid;
      place-items: center;
      border: 1px solid var(--orbit-line);
      border-radius: 50%;
      color: var(--orbit-ink);
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 10px 30px rgba(26, 36, 52, .1);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) rotate(var(--angle)) translate(0) rotate(calc(-1 * var(--angle)));
      transition: transform .45s cubic-bezier(.2, .9, .2, 1), opacity .25s ease, background .2s ease;
    }

    .nav-orbit[data-open="true"] .nav-item {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) rotate(var(--angle)) translate(4.25rem) rotate(calc(-1 * var(--angle)));
    }

    .nav-item:hover,
    .nav-item:focus-visible {
      background: var(--orbit-mint);
      outline: none;
    }

    .nav-item svg {
      width: 1.2rem;
      height: 1.2rem;
    }

    .nav-item span {
      position: absolute;
      right: 3.2rem;
      white-space: nowrap;
      background: var(--orbit-ink);
      color: white;
      font-size: .78rem;
      font-weight: 700;
      padding: .35rem .5rem;
      border-radius: var(--orbit-radius);
      opacity: 0;
      transform: translateX(.4rem);
      transition: opacity .2s ease, transform .2s ease;
    }

    .nav-item:hover span,
    .nav-item:focus-visible span {
      opacity: 1;
      transform: translateX(0);
    }

    @media (max-width: 620px) {
      .nav-orbit {
        top: auto;
        bottom: .9rem;
        right: .9rem;
        width: 4.6rem;
        height: 4.6rem;
        transform: none;
      }

      .nav-toggle {
        inset: .25rem;
        background: rgba(255, 255, 255, .94);
      }

      .nav-toggle svg {
        width: 1.45rem;
        height: 1.45rem;
      }

      .nav-item {
        width: 2.75rem;
        height: 2.75rem;
        background: rgba(255, 255, 255, .96);
      }

      .nav-orbit[data-open="true"] .nav-item {
        opacity: 1;
        pointer-events: auto;
      }

      .nav-orbit[data-open="true"] .nav-item:nth-of-type(1) {
        transform: translate(-50%, -50%) rotate(272deg) translate(9.15rem) rotate(-272deg);
      }
      .nav-orbit[data-open="true"] .nav-item:nth-of-type(2) {
        transform: translate(-50%, -50%) rotate(242deg) translate(9.15rem) rotate(-242deg);
      }
      .nav-orbit[data-open="true"] .nav-item:nth-of-type(3) {
        transform: translate(-50%, -50%) rotate(212deg) translate(9.15rem) rotate(-212deg);
      }
      .nav-orbit[data-open="true"] .nav-item:nth-of-type(4) {
        transform: translate(-50%, -50%) rotate(182deg) translate(9.15rem) rotate(-182deg);
      }
      .nav-orbit[data-open="true"] .nav-item:nth-of-type(5) {
        transform: translate(-50%, -50%) rotate(257deg) translate(6.25rem) rotate(-257deg);
      }

      .nav-item span {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }
  </style>

<body>
  <nav class="nav-orbit" data-open="false" aria-label="Page sections">
    <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Open navigation instrument">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
      </svg>
    </button>
    <a class="nav-item" href="#about" style="--angle: 270deg" aria-label="About">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm7 9a7 7 0 0 0-14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></svg>
      <span>About</span>
    </a>
    <a class="nav-item" href="#work" style="--angle: 330deg" aria-label="Work">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m-13 4h18M5 7h14a2 2 0 0 1 2 2v11H3V9a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      <span>Work</span>
    </a>
    <a class="nav-item" href="#proof" style="--angle: 30deg" aria-label="Proof">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 8h10M7 12h7M5 20l3-4h11a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      <span>Proof</span>
    </a>
    <a class="nav-item" href="#life" style="--angle: 90deg" aria-label="Life">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 17 9 7l4 8 3-5 4 7H4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path></svg>
      <span>Life</span>
    </a>
    <a class="nav-item" href="#contact" style="--angle: 150deg" aria-label="Contact">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6h16v12H4V6Zm0 1 8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path></svg>
      <span>Contact</span>
    </a>
  </nav>

  <script>
    const orbit = document.querySelector(".nav-orbit");
    const navButton = document.querySelector(".nav-toggle");

    navButton.addEventListener("click", () => {
      const isOpen = orbit.dataset.open === "true";
      orbit.dataset.open = String(!isOpen);
      navButton.setAttribute("aria-expanded", String(!isOpen));
      navButton.setAttribute("aria-label", isOpen ? "Open navigation instrument" : "Close navigation instrument");
    });

    document.querySelectorAll(".nav-item").forEach((item) => {
      item.addEventListener("click", () => {
        orbit.dataset.open = "false";
        navButton.setAttribute("aria-expanded", "false");
        navButton.setAttribute("aria-label", "Open navigation instrument");
      });
    });
  </script>
  <script type="module" src="assets/js/load-service-worker.js"></script>
</body>
