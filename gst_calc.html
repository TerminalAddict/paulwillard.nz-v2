    <main class="gst-layout">
      <section class="bento-card gst-hero">
        <div class="bento-card-bg-decoration" style="background: var(--accent-mint); top: -40px; right: -40px;"></div>
        <span class="card-tag card-tag-business">Calculator</span>
        <h1 class="card-title">NZ 15% GST Calculator</h1>
        <p class="card-subtitle">Calculate GST-inclusive prices, GST-exclusive prices, or the GST content for New Zealand's 15% GST rate.</p>
      </section>

      <section class="bento-card gst-calculator-card">
        <div class="bento-card-bg-decoration" style="background: var(--accent-blue); bottom: -50px; left: -40px;"></div>
        <h2 class="sr-only">GST Calculator Form</h2>
        <form action="#" method="post" id="gstform" class="gst-form" novalidate>
          <div class="gst-field">
            <label for="GSTExclusivePrice">GST Exclusive Price</label>
            <div class="gst-control-row">
              <input type="text" id="GSTExclusivePrice" name="GSTExclusivePrice" class="gst-input" inputmode="decimal" autocomplete="off" value="0">
              <button type="button" name="CalcGST" class="gst-action-btn">Add GST</button>
            </div>
          </div>

          <div class="gst-field">
            <label for="GSTInclusivePrice">GST Inclusive Price</label>
            <div class="gst-control-row">
              <input type="text" id="GSTInclusivePrice" name="GSTInclusivePrice" class="gst-input" inputmode="decimal" autocomplete="off" value="0">
              <button type="button" name="CalcInclGST" class="gst-action-btn">Get GST</button>
            </div>
          </div>

          <div class="gst-field">
            <label for="GSTContent">GST Content</label>
            <div class="gst-control-row">
              <input type="text" id="GSTContent" name="GSTContent" class="gst-input" inputmode="decimal" autocomplete="off" value="0">
              <button type="button" name="CalcGSTContent" class="gst-action-btn">Get Prices</button>
            </div>
          </div>

          <div class="gst-footer-row">
            <p id="gst-error-message" class="gst-error-message" aria-live="polite"></p>
            <button type="button" name="CalcGSTClear" class="gst-clear-btn">Clear</button>
          </div>
        </form>
      </section>
    </main>
